name: Deploy Jupyter Book

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BASE_URL: /jupyterbook_Modelacion_Ambiental
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure Python kernel is available
        run: python -m ipykernel install --user --name python3 --display-name "Python 3"

      - name: Execute portable notebooks
        env:
          MPLBACKEND: Agg
        run: |
          python -m nbconvert --to notebook --execute --inplace notebooks/Guia_practica_MaunaLoa_NOAA.ipynb
          python -m nbconvert --to notebook --execute --inplace notebooks/Guia_practica_Globo_medicion.ipynb
          python -m nbconvert --to notebook --execute --inplace notebooks/Guia_practica_Lorenz_RK4.ipynb

      - name: Build book
        run: python -m jupyter_book build --all --html --site --force

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _build/html

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
